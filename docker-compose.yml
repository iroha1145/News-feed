services:
  macrolens:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runtime
    image: macrolens-etl:personal
    container_name: macrolens-etl
    ports:
      - "${HOST_BIND:-127.0.0.1}:${PORT:-8000}:8000"
    env_file:
      - path: secrets.env
        required: false
    volumes:
      - macrolens-data:/app/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  macrolens-data:
