x-backend-image: &backend-image
  build:
    context: .
    dockerfile: backend/Dockerfile
    target: runtime
  image: macrolens-backend:local

x-analysis-runtime-environment: &analysis-runtime-environment
  DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///data/macrolens.db}
  DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-openai}
  DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-gpt-5.6-terra}
  DEFAULT_LLM_API_KEY: ${DEFAULT_LLM_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
  OPENAI_ALLOW_CUSTOM_BASE_URL: ${OPENAI_ALLOW_CUSTOM_BASE_URL:-false}
  OPENAI_ALLOW_LOCAL_HTTP: ${OPENAI_ALLOW_LOCAL_HTTP:-false}
  OPENAI_REASONING: ${OPENAI_REASONING:-max}
  OPENAI_EXECUTION_MODE: ${OPENAI_EXECUTION_MODE:-background}
  OPENAI_SYNC_TIMEOUT_SECONDS: ${OPENAI_SYNC_TIMEOUT_SECONDS:-900}
  OPENAI_BACKGROUND_POLL_TIMEOUT_SECONDS: ${OPENAI_BACKGROUND_POLL_TIMEOUT_SECONDS:-1800}
  OPENAI_BACKGROUND_INITIAL_POLL_SECONDS: ${OPENAI_BACKGROUND_INITIAL_POLL_SECONDS:-2}
  OPENAI_BACKGROUND_MAX_POLL_SECONDS: ${OPENAI_BACKGROUND_MAX_POLL_SECONDS:-15}
  OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-128000}
  OPENAI_MAX_CONCURRENCY: ${OPENAI_MAX_CONCURRENCY:-2}
  OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-0}
  NEWS_IMPACT_PROMPT_VERSION: ${NEWS_IMPACT_PROMPT_VERSION:-news-impact-v2}
  NEWS_IMPACT_SCHEMA_VERSION: ${NEWS_IMPACT_SCHEMA_VERSION:-news-impact-schema-v2}
  NEWS_LLM_AUTO_ANALYZE_ENABLED: ${NEWS_LLM_AUTO_ANALYZE_ENABLED:-false}
  NEWS_ITEM_MAX_OUTPUT_TOKENS: ${NEWS_ITEM_MAX_OUTPUT_TOKENS:-32768}
  NEWS_LLM_MAX_INFLIGHT: ${NEWS_LLM_MAX_INFLIGHT:-2}
  NEWS_LLM_MAX_QUEUED: ${NEWS_LLM_MAX_QUEUED:-200}
  NEWS_LLM_DAILY_JOB_LIMIT: ${NEWS_LLM_DAILY_JOB_LIMIT:-}
  NEWS_LLM_DAILY_OUTPUT_TOKEN_LIMIT: ${NEWS_LLM_DAILY_OUTPUT_TOKEN_LIMIT:-}
  NEWS_LLM_MANUAL_DAILY_JOB_LIMIT: ${NEWS_LLM_MANUAL_DAILY_JOB_LIMIT:-50}
  NEWS_LLM_MANUAL_DAILY_OUTPUT_TOKEN_LIMIT: ${NEWS_LLM_MANUAL_DAILY_OUTPUT_TOKEN_LIMIT:-1638400}
  HOT_CYCLE_ENABLED: ${HOT_CYCLE_ENABLED:-false}
  HOT_CYCLE_SCHEDULE_ENABLED: ${HOT_CYCLE_SCHEDULE_ENABLED:-false}
  HOT_CYCLE_TIMES_ET: ${HOT_CYCLE_TIMES_ET:-08:00,12:00,16:00}
  HOT_CYCLE_OPTIONAL_20_ET: ${HOT_CYCLE_OPTIONAL_20_ET:-false}
  HOT_CYCLE_MANUAL_ENABLED: ${HOT_CYCLE_MANUAL_ENABLED:-true}
  HOT_CYCLE_MAX_OUTPUT_TOKENS: ${HOT_CYCLE_MAX_OUTPUT_TOKENS:-49152}
  HOT_CYCLE_DAILY_JOB_LIMIT: ${HOT_CYCLE_DAILY_JOB_LIMIT:-}
  HOT_CYCLE_DAILY_OUTPUT_TOKEN_LIMIT: ${HOT_CYCLE_DAILY_OUTPUT_TOKEN_LIMIT:-}
  NEWS_LLM_MIN_CONTEXT_CHARS: ${NEWS_LLM_MIN_CONTEXT_CHARS:-100}
  NEWS_LLM_MIN_MARKET_RELEVANCE: ${NEWS_LLM_MIN_MARKET_RELEVANCE:-35}
  ANALYSIS_WORKER_POLL_SECONDS: ${ANALYSIS_WORKER_POLL_SECONDS:-5}
  ANALYSIS_WORKER_LEASE_SECONDS: ${ANALYSIS_WORKER_LEASE_SECONDS:-120}
  ANALYSIS_JOB_RETRY_COOLDOWN_SECONDS: ${ANALYSIS_JOB_RETRY_COOLDOWN_SECONDS:-300}
  CALENDAR_ANALYSIS_PROMPT_VERSION: ${CALENDAR_ANALYSIS_PROMPT_VERSION:-calendar-impact-v1}
  CALENDAR_ANALYSIS_SCHEMA_VERSION: ${CALENDAR_ANALYSIS_SCHEMA_VERSION:-calendar-impact-schema-v1}
  CALENDAR_LLM_MAX_INFLIGHT: ${CALENDAR_LLM_MAX_INFLIGHT:-1}
  CALENDAR_LLM_MAX_QUEUED: ${CALENDAR_LLM_MAX_QUEUED:-10}
  CALENDAR_MAX_OUTPUT_TOKENS: ${CALENDAR_MAX_OUTPUT_TOKENS:-16384}
  CALENDAR_LLM_DAILY_JOB_LIMIT: ${CALENDAR_LLM_DAILY_JOB_LIMIT:-10}
  CALENDAR_LLM_DAILY_OUTPUT_TOKEN_LIMIT: ${CALENDAR_LLM_DAILY_OUTPUT_TOKEN_LIMIT:-200000}
  ANALYSIS_RETENTION_LIMIT: ${ANALYSIS_RETENTION_LIMIT:-350}
  NEWS_RETENTION_DAYS: ${NEWS_RETENTION_DAYS:-}
  X_SENTIMENT_RETENTION_DAYS: ${X_SENTIMENT_RETENTION_DAYS:-}
  OPTION_PRO_FOCUS_BASE_URL: ${OPTION_PRO_FOCUS_BASE_URL:-}
  OPTION_PRO_FOCUS_KEY_ID: ${OPTION_PRO_FOCUS_KEY_ID:-}
  OPTION_PRO_FOCUS_SECRET: ${OPTION_PRO_FOCUS_SECRET:-}
  OPTION_PRO_FOCUS_VERIFY_TLS: ${OPTION_PRO_FOCUS_VERIFY_TLS:-true}
  OPTION_PRO_FOCUS_CA_BUNDLE: ${OPTION_PRO_FOCUS_CA_BUNDLE:-}
  OPTION_PRO_FOCUS_INTERVAL_SECONDS: ${OPTION_PRO_FOCUS_INTERVAL_SECONDS:-1800}
  NEWS_ITEM_RETENTION_DAYS: ${NEWS_ITEM_RETENTION_DAYS:-}
  ANALYSIS_JOB_RETENTION_DAYS: ${ANALYSIS_JOB_RETENTION_DAYS:-}
  ANALYSIS_REVISION_RETENTION_DAYS: ${ANALYSIS_REVISION_RETENTION_DAYS:-}
  STOCK_IMPACT_RETENTION_DAYS: ${STOCK_IMPACT_RETENTION_DAYS:-}
  EVENT_GROUP_RETENTION_DAYS: ${EVENT_GROUP_RETENTION_DAYS:-}
  ANALYSIS_CYCLE_RETENTION_DAYS: ${ANALYSIS_CYCLE_RETENTION_DAYS:-}
  CALENDAR_REVISION_RETENTION_DAYS: ${CALENDAR_REVISION_RETENTION_DAYS:-}
  INTEGRATION_CHANGE_RETENTION_DAYS: ${INTEGRATION_CHANGE_RETENTION_DAYS:-}

services:
  data-init:
    <<: *backend-image
    container_name: macrolens-data-init
    user: "0:0"
    command:
      - sh
      - -c
      - >-
        source_path=$$(readlink -m -- "$$DATA_SOURCE");
        case "$$source_path" in
          /|/bin|/boot|/dev|/etc|/home|/lib|/lib64|/opt|/proc|/root|/run|/sbin|/srv|/sys|/tmp|/usr|/var)
            echo 'Refusing unsafe data-directory ownership change' >&2; exit 1 ;;
        esac;
        chown 10001:10001 /app/data;
        find /app/data -maxdepth 1 -type f \( -name '*.db' -o -name '*.db-wal' -o -name '*.db-shm' -o -name 'calendar_cache.json' \) -exec chown 10001:10001 {} +
    environment:
      DATA_SOURCE: ${MACROLENS_DATA_DIR:-./backend/data}
    volumes:
      - ${MACROLENS_DATA_DIR:-./backend/data}:/app/data
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

  backend:
    <<: *backend-image
    container_name: macrolens-backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ${MACROLENS_DATA_DIR:-./backend/data}:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      <<: *analysis-runtime-environment
      MACROLENS_OPTION_PRO_CONTRACT_PATH: ${MACROLENS_OPTION_PRO_CONTRACT_PATH:-/app/contracts/macrolens-option-pro-v1.json}
    depends_on:
      data-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  analysis-worker:
    <<: *backend-image
    container_name: macrolens-analysis-worker
    command: ["python", "-m", "app.analysis_worker"]
    volumes:
      - ${MACROLENS_DATA_DIR:-./backend/data}:/app/data
    environment:
      <<: *analysis-runtime-environment
      MACROLENS_OPTION_PRO_CONTRACT_PATH: ${MACROLENS_OPTION_PRO_CONTRACT_PATH:-/app/contracts/macrolens-option-pro-v1.json}
    depends_on:
      backend:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker_healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: macrolens-frontend
    ports:
      - "127.0.0.1:3000:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=32m,mode=0755
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
