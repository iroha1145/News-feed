x-backend-image: &backend-image
  build:
    context: ./backend
    target: runtime
  image: macrolens-backend:local

services:
  data-init:
    <<: *backend-image
    container_name: macrolens-data-init
    user: "0:0"
    command:
      - sh
      - -c
      - >-
        source_path=$$(readlink -m -- "$$DATA_SOURCE");
        case "$$source_path" in
          /|/bin|/boot|/dev|/etc|/home|/lib|/lib64|/opt|/proc|/root|/run|/sbin|/srv|/sys|/tmp|/usr|/var)
            echo 'Refusing unsafe data-directory ownership change' >&2; exit 1 ;;
        esac;
        chown 10001:10001 /app/data;
        find /app/data -maxdepth 1 -type f \( -name '*.db' -o -name '*.db-wal' -o -name '*.db-shm' -o -name 'calendar_cache.json' \) -exec chown 10001:10001 {} +
    environment:
      DATA_SOURCE: ${MACROLENS_DATA_DIR:-./backend/data}
    volumes:
      - ${MACROLENS_DATA_DIR:-./backend/data}:/app/data
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

  backend:
    <<: *backend-image
    container_name: macrolens-backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ${MACROLENS_DATA_DIR:-./backend/data}:/app/data
    env_file:
      - path: .env
        required: false
    depends_on:
      data-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: macrolens-frontend
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=32m,mode=0755
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
