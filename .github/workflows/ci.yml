name: CI

on:
  push:
    branches: [main, "feat/**", "refactor/**"]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Run offline ETL tests
        env:
          PYTHONPATH: backend
          INTERNAL_API_TOKEN: ci-internal-token
          DATA_DIR: /tmp
        run: pytest -q backend/tests

  container:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - name: Create isolated server Secret file
        env:
          INTERNAL_API_TOKEN: ci-internal-token
          DATA_DIR: /app/data
        run: |
          printf '%s\n' "$INTERNAL_API_TOKEN" | ./personal.sh secrets set INTERNAL_API_TOKEN
          printf '%s\n' "$DATA_DIR" | ./personal.sh secrets set DATA_DIR
          ./personal.sh secrets validate
      - name: Validate single-service Compose files
        run: |
          docker compose config --services | diff -u <(printf 'macrolens\n') -
          docker compose -f docker-compose.personal.yml config --services | diff -u <(printf 'macrolens\n') -
      - name: Build and start MacroLens ETL
        run: docker compose up -d --build --wait --wait-timeout 180 macrolens
      - name: Verify health, authentication, and read-only root
        env:
          INTERNAL_API_TOKEN: ci-internal-token
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8000/health |
            python -c 'import json,sys; assert json.load(sys.stdin)["status"] == "ok"'
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8000/internal/v1/health)" = "401"
          curl --fail --silent --show-error -H "Authorization: Bearer $INTERNAL_API_TOKEN" \
            http://127.0.0.1:8000/internal/v1/health |
            python -c 'import json,sys; assert json.load(sys.stdin)["database"] == "ok"'
          if docker compose exec -T macrolens touch /app/.rootfs-write-probe; then exit 1; fi
      - name: Show logs after failure
        if: failure()
        run: docker compose logs --tail=200 macrolens
      - name: Clean up
        if: always()
        run: docker compose down --remove-orphans --volumes
